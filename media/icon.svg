<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Main agent circle -->
  <circle cx="64" cy="50" r="24" stroke="url(#accentGrad)" stroke-width="3" fill="none"/>
  <circle cx="64" cy="50" r="12" stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Center dot -->
  <circle cx="64" cy="50" r="4" fill="url(#accentGrad)"/>
  
  <!-- Spawn rays -->
  <line x1="64" y1="20" x2="64" y2="12" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="94" y1="50" x2="102" y2="50" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="50" x2="26" y2="50" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Spawned agent circles -->
  <circle cx="32" cy="100" r="12" stroke="#4ecdc4" stroke-width="2.5" fill="none"/>
  <circle cx="64" cy="100" r="12" stroke="#4ecdc4" stroke-width="2.5" fill="none"/>
  <circle cx="96" cy="100" r="12" stroke="#4ecdc4" stroke-width="2.5" fill="none"/>
  
  <!-- Inner dots for spawned agents -->
  <circle cx="32" cy="100" r="4" fill="#4ecdc4"/>
  <circle cx="64" cy="100" r="4" fill="#4ecdc4"/>
  <circle cx="96" cy="100" r="4" fill="#4ecdc4"/>
  
  <!-- Connection lines -->
  <line x1="48" y1="70" x2="36" y2="88" stroke="#4ecdc4" stroke-width="1.5" opacity="0.5"/>
  <line x1="64" y1="74" x2="64" y2="88" stroke="#4ecdc4" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="70" x2="92" y2="88" stroke="#4ecdc4" stroke-width="1.5" opacity="0.5"/>
</svg>
