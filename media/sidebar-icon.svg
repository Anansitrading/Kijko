<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Claude-inspired icon with multiple agent representation -->
  <!-- Main circle (primary agent) -->
  <circle cx="12" cy="10" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/>
  
  <!-- Inner circle pattern (Claude aesthetic) -->
  <circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Spawn indicator lines radiating outward -->
  <line x1="12" y1="2" x2="12" y2="0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="10" x2="20" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="10" x2="4" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Multiple small circles representing spawned agents -->
  <circle cx="5" cy="20" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
  <circle cx="12" cy="20" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
  <circle cx="19" cy="20" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
  
  <!-- Connection lines from main to spawned -->
  <line x1="9" y1="15" x2="6" y2="17.5" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="16" x2="12" y2="17.5" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="15" y1="15" x2="18" y2="17.5" stroke="currentColor" stroke-width="1" opacity="0.5"/>
</svg>
